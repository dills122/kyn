name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go version
        run: go version

      - name: Format check
        run: |
          FILES="$(gofmt -l cmd internal)"
          if [ -n "$FILES" ]; then
            echo "Files need gofmt:"
            echo "$FILES"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5

      - name: Vet
        run: go vet ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22.x", "1.23.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go version
        run: go version

      - name: Test
        run: go test ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute coverage
        run: |
          go test ./internal/... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Enforce minimum internal coverage
        run: |
          TOTAL="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "Total coverage: ${TOTAL}%"
          awk "BEGIN {exit !(${TOTAL} >= 80.0)}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build ./cmd/kyn

  linux-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            platform: linux/amd64
            image: debian:stable-slim
            label: debian-amd64
          - goarch: amd64
            platform: linux/amd64
            image: alpine:3.20
            label: alpine-amd64
          - goarch: arm64
            platform: linux/arm64
            image: debian:stable-slim
            label: debian-arm64
          - goarch: arm64
            platform: linux/arm64
            image: alpine:3.20
            label: alpine-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build static binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -o ./bin/kyn ./cmd/kyn

      - name: Smoke static binary
        run: |
          docker run --rm \
            --platform=${{ matrix.platform }} \
            -v "$PWD/bin/kyn:/usr/local/bin/kyn:ro" \
            ${{ matrix.image }} \
            /usr/local/bin/kyn --help
